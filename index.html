<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Readz</title>

    <meta name="description" content="A beautiful, distraction-free EPUB reader for the web.">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/library.css">
    <link rel="stylesheet" href="css/reader.css">

</head>

<body>

    <!-- APP -->

    <div id="app">

        <!-- ========================================= -->
        <!-- LIBRARY VIEW -->
        <!-- ========================================= -->

        <main id="library-view">

            <header>

                <div>

                    <h1>Readz</h1>

                    <p>Leé con libertad.</p>

                </div>

            </header>

            <section id="welcome">

                <h2>Toda biblioteca empieza con un libro.</h2>

                <p>
                    Importá un archivo EPUB para comenzar tu biblioteca.
                </p>

                <button
                    id="import-book-button"
                    class="button-primary">

                    Importar EPUB
    
                </button>

            </section>

            <section id="my-library">

                <h2>Mi biblioteca</h2>

                <div id="library-grid">

                    <div class="empty-state">

                        <p>No hay libros en tu biblioteca.</p>

                    </div>

                </div>

            </section>

            <section id="public-library">

                <h2>Nuestra biblioteca</h2>

                <p>
                    Descubrí clásicos gratuitos para agregar a tu biblioteca.
                </p>

                <div id="public-library-grid">

                    <div class="empty-state">

                        <p>Próximamente podrás descargar clásicos gratuitos.</p>

                    </div>

                </div>

            </section>

        </main>

        <!-- ========================================= -->
        <!-- READER VIEW -->
        <!-- ========================================= -->

        <main id="reader-view" hidden>

            <!-- EPUB.js renderizará aquí -->

        </main>

        <!-- ========================================= -->
        <!-- SETTINGS -->
        <!-- ========================================= -->

        <aside id="settings-panel" hidden>

        </aside>

        <!-- ========================================= -->
        <!-- MODALS -->
        <!-- ========================================= -->

        <div id="modal-container">

        </div>

    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
